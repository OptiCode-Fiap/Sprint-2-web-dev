<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jovi V70 Camera Concept</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    
    <header>
        <h1>Jovi V70 </h1>
        <p>Experiência aprimorada de armazenamento e filtragem</p>
        <p>OptiCode</p>
    </header>

    
    <section id="storage">
        <h2>Pré-visualização do armazenamento</h2>
        <p>Veja suas fotos e vídeos com mais clareza e organização.</p>
        <div class="storage-box">
            
             <img src="./src/imagens/image.png" alt="">
        </div>
    </section>

   
    <section id="filters">
        <h2>Controle de Filtro</h2>
        <p>Ajuste os filtros da sua câmera facilmente</p>
        <div class="filter-buttons">
            <button class="filter-btn">Filtro 1</button>
            <button class="filter-btn">Filtro 2</button>
            <button class="filter-btn">Filtro 3</button>
        </div>
    </section>

   
    <section id="slideshow">
        <h2>Layout de Câmera</h2>
        <img id="slideImage" src="./src/imagens/image.png" alt="Slideshow Image">
        <div class="slide-controls">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
        </div>
    </section>

<script>
    
    document.getElementById('storage').style.display = 'none';
    document.getElementById('filters').style.display = 'none';
    document.getElementById('slideshow').style.display = 'none';

       const usuario = prompt('digite o usuario');
    const senha = prompt('digite a senha');
    
    if (usuario === 'admin' && senha === '123') {
        document.getElementById('storage').style.display = 'block';
        document.getElementById('filters').style.display = 'block';
        document.getElementById('slideshow').style.display = 'block';
        alert('Login feito');
    } else {
        alert('Usuario ou senha esta errado');
        
        location.reload();
    }
</script>

</body>
</html>
